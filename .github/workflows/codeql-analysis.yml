name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 6 * * 1

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - '*.ts'
              - '*.js'

  analyze:
    name: Analyze
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
